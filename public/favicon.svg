<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#008080"/>
      <stop offset="100%" stop-color="#00A3A3"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Book spine -->
  <rect x="14" y="12" width="4" height="40" rx="2" fill="#E6E6FA" opacity="0.9"/>
  <!-- Book page -->
  <rect x="18" y="12" width="32" height="40" rx="3" fill="url(#page)"/>
  <!-- Text lines -->
  <rect x="23" y="20" width="18" height="2.5" rx="1.25" fill="#008080" opacity="0.7"/>
  <rect x="23" y="26" width="22" height="2" rx="1" fill="#D9D9D9"/>
  <rect x="23" y="31" width="16" height="2" rx="1" fill="#D9D9D9"/>
  <rect x="23" y="36" width="20" height="2" rx="1" fill="#D9D9D9"/>
  <!-- Globe accent -->
  <circle cx="42" cy="44" r="7" fill="none" stroke="#AAF0D1" stroke-width="2" opacity="0.9"/>
  <ellipse cx="42" cy="44" rx="3.5" ry="7" fill="none" stroke="#AAF0D1" stroke-width="1.2" opacity="0.7"/>
  <line x1="35" y1="44" x2="49" y2="44" stroke="#AAF0D1" stroke-width="1.2" opacity="0.7"/>
</svg>
